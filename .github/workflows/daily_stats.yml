name: Albion Guild — Daily Stats

on:
  # ── Scheduled trigger: every day at 10:00 UTC ──────────────
  schedule:
    - cron: "0 10 * * *"

  # ── Manual trigger from the Actions tab ────────────────────
  workflow_dispatch:

jobs:
  daily-stats:
    name: Fetch stats & post to Discord
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to push the DB commit back

    steps:
      # 1. Check out the full repo (with git history)
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies for faster runs
      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Run the full pipeline via the controller script
      #    The DB file is already in the repo from the previous commit
      - name: Run daily pipeline
        env:
          DISCORD_TOKEN:        ${{ secrets.DISCORD_TOKEN }}
          ALBION_GUILD_ID:      ${{ secrets.ALBION_GUILD_ID }}
          DISCORD_CHANNEL_IDS:  ${{ secrets.DISCORD_CHANNEL_IDS }}
        run: python run_daily.py

      # 6. Commit the updated database back to the repository
      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add albion_guild_stats.db
          # Only commit if the DB actually changed
          git diff --cached --quiet || git commit -m "chore: update stats DB [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
